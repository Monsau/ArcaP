version: '3.8'

services:
  # MinIO - S3-compatible object storage for document archival (AI Services)
  minio-ai-service:
    image: minio/minio:latest
    container_name: minio-ai
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"   # API endpoint (external:internal)
      - "9003:9001"   # Web console (external:internal)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio/data:/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Ollama - Local LLM server
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ai-services/ollama/models:/root/.ollama
    networks:
      - ai-network
    restart: unless-stopped

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    ports:
      - "6333:6333"   # HTTP / REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - ./ai-services/qdrant/storage:/qdrant/storage
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Embedding Service - Text embeddings for RAG
  embedding-service:
    build:
      context: ./ai-services/embedding
      dockerfile: Dockerfile
    container_name: embedding-service
    ports:
      - "8001:8001"
    environment:
      - MODEL_NAME=all-MiniLM-L6-v2
      - EMBEDDING_DIM=384
      - MAX_SEQ_LENGTH=512
    volumes:
      - ./ai-services/embedding/models:/models
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # RAG API - Retrieval-Augmented Generation service
  rag-api:
    build:
      context: ./ai-services/rag-api
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8002:8002"
    environment:
      # LLM Configuration
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=llama3.1
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=2048
      
      # Vector Database Configuration (Qdrant)
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - COLLECTION_NAME=data_platform_knowledge
      - EMBEDDING_DIM=384
      - TOP_K=5
      # Governance collections
      - GOV_COLLECTION=om_knowledge
      - OP_COLLECTION=data_platform_knowledge
      - GOV_MODE_DEFAULT=governance-first
      - GOV_MIN_SCORE=0.35
      # OpenMetadata (Governance SoT) - set OM_HOST to openmetadata-server when OMD stack is running
      - OM_HOST=openmetadata-server
      - OM_PORT=8585
      - OM_API_TOKEN=
      
      # Embedding Service Configuration
      - EMBEDDING_SERVICE_URL=http://embedding-service:8001
      
      # MinIO/S3 Configuration for Document Storage
      - MINIO_ENDPOINT=minio-ai-service:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=ai-documents
      - MINIO_SECURE=false
    depends_on:
      - ollama
      - qdrant
      - embedding-service
      - minio-ai-service
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Chat UI - Web interface for AI interactions
  chat-ui:
    build:
      context: ./ai-services/chat-ui
      dockerfile: Dockerfile
    container_name: chat-ui
    ports:
      - "8501:8501"
    environment:
      - RAG_API_URL=http://rag-api:8002
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PLATFORM_VERSION=v1.1.0
    depends_on:
      - rag-api
    networks:
      - ai-network
    restart: unless-stopped

networks:
  ai-network:
    driver: bridge
  # Uncomment and run with: docker network create openmetadata_net
  # to allow rag-api to reach OpenMetadata when both stacks are running.
  # openmetadata_net:
  #   external: true
  #   name: openmetadata_net
