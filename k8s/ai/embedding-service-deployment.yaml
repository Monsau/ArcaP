# Embedding Service — all-MiniLM-L6-v2 sentence-transformers
# Port: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: arcap
  labels:
    app: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: arcap/embedding-service:latest   # build from ai-services/embedding/
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: arcap
  labels:
    app: embedding-service
spec:
  selector:
    app: embedding-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
