# Ollama — Local LLM Server
# Port: 11434
# Storage: persistent PVC for downloaded models (~5–20 GB)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: arcap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  # storageClassName: standard   # uncomment and set your storage class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: arcap
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
              # nvidia.com/gpu: "1"   # uncomment for GPU acceleration
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: arcap
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - name: api
      port: 11434
      targetPort: 11434
  type: ClusterIP
