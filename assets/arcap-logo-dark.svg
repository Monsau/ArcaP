<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 56" fill="none">
  <defs>
    <linearGradient id="apGLd" x1="0" y1="0" x2="218" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Icon: Data Platform — three stacked data-layer arcs with orchestration node -->
  <!-- Bottom tier (widest · full opacity) -->
  <path d="M4,44 Q30,36 56,44"
        stroke="url(#apGLd)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Middle tier -->
  <path d="M9,33 Q30,25 51,33"
        stroke="url(#apGLd)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.75"/>
  <!-- Top tier (narrowest · least opaque) -->
  <path d="M15,22 Q30,14 45,22"
        stroke="url(#apGLd)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Orchestration node -->
  <circle cx="30" cy="10" r="4"   fill="url(#apGLd)"/>
  <!-- Data-endpoint nodes -->
  <circle cx="4"  cy="44" r="2.5" fill="url(#apGLd)" opacity="0.55"/>
  <circle cx="56" cy="44" r="2.5" fill="url(#apGLd)" opacity="0.55"/>

  <!-- Dashed flow lines -->
  <line x1="30" y1="14" x2="4"  y2="44" stroke="url(#apGLd)" stroke-width="1.4" stroke-dasharray="2.5,3" opacity="0.7"/>
  <line x1="30" y1="14" x2="56" y2="44" stroke="url(#apGLd)" stroke-width="1.4" stroke-dasharray="2.5,3" opacity="0.7"/>

  <!-- Text: ArcaP (for light backgrounds — dark strokes + gradient P) -->
  <g transform="translate(66,0)" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="5"
     stroke="rgba(15,23,42,0.88)">
    <!-- A -->
    <path d="M0,48 L16,8 L32,48"/>
    <line x1="7" y1="26" x2="25" y2="26"/>
    <!-- r -->
    <line x1="38" y1="48" x2="38" y2="18"/>
    <path d="M38,26 C38,18 54,18 54,24"/>
    <!-- c -->
    <path d="M82,22 C82,14 60,14 60,33 C60,52 82,52 82,44"/>
    <!-- a -->
    <path d="M114,48 L114,31 C114,19 102,17 92,23 S84,37 96,37 L114,37"/>
    <path d="M114,48 C108,56 90,56 86,47"/>
    <!-- P — gradient accent -->
    <line x1="120" y1="8"  x2="120" y2="48" stroke="url(#apGLd)"/>
    <path d="M120,8 C148,8 148,30 120,30"   stroke="url(#apGLd)" fill="none"/>
  </g>
</svg>
