<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" fill="none">
  <defs>
    <!-- Background gradient: deep navy left → rich dark blue right -->
    <linearGradient id="bg" x1="0" y1="0" x2="1584" y2="396" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#040d1e"/>
      <stop offset="50%"  stop-color="#071630"/>
      <stop offset="100%" stop-color="#0a1a3a"/>
    </linearGradient>

    <!-- Brand accent: cyan-blue used on icons and highlighted letters -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Same but absolute coords for icon inside cards -->
    <linearGradient id="acQ"  x1="0" y1="0" x2="80" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="acX"  x1="0" y1="0" x2="80" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="acP"  x1="0" y1="0" x2="80" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>

    <!-- Subtle grid overlay filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Card glass blur background -->
    <filter id="glass">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(96,165,250,0.06)" stroke-width="1">
    <!-- vertical -->
    <line x1="198" y1="0" x2="198" y2="396"/>
    <line x1="396" y1="0" x2="396" y2="396"/>
    <line x1="594" y1="0" x2="594" y2="396"/>
    <line x1="792" y1="0" x2="792" y2="396"/>
    <line x1="990" y1="0" x2="990" y2="396"/>
    <line x1="1188" y1="0" x2="1188" y2="396"/>
    <line x1="1386" y1="0" x2="1386" y2="396"/>
    <!-- horizontal -->
    <line x1="0" y1="99" x2="1584" y2="99"/>
    <line x1="0" y1="198" x2="1584" y2="198"/>
    <line x1="0" y1="297" x2="1584" y2="297"/>
  </g>

  <!-- Glow orb left -->
  <ellipse cx="200" cy="198" rx="260" ry="180" fill="#1d4ed8" opacity="0.12"/>
  <!-- Glow orb right -->
  <ellipse cx="1384" cy="198" rx="260" ry="180" fill="#0891b2" opacity="0.10"/>

  <!-- ══════════════════════════════════════════════════════
       LEFT BLOCK — Talentys + tagline + "Arca suite"
  ══════════════════════════════════════════════════════ -->

  <!-- Company name: Talentys -->
  <text x="72" y="148"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="58" font-weight="700" letter-spacing="-1"
        fill="white" opacity="0.95">Talentys</text>

  <!-- Accent rule under company name -->
  <rect x="72" y="162" width="220" height="3" rx="2" fill="url(#accent)" opacity="0.9"/>

  <!-- Tagline -->
  <text x="72" y="202"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400" letter-spacing="0.5"
        fill="rgba(148,163,184,0.90)">Data Engineering &amp; AI Excellence</text>

  <!-- "Arca suite  ·  family consistency" label -->
  <text x="72" y="270"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="3"
        fill="rgba(96,165,250,0.70)" text-transform="uppercase">ARCA SUITE  ·  FAMILY CONSISTENCY</text>

  <!-- Thin separator between left block and cards -->
  <line x1="430" y1="60" x2="430" y2="336" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════
       THREE PRODUCT CARDS  (x positions: 490, 790, 1090)
  ══════════════════════════════════════════════════════ -->

  <!-- ─── CARD TEMPLATE helper: glass rect ─── -->
  <!-- ArcaQ card -->
  <rect x="480" y="80" width="270" height="236" rx="16"
        fill="rgba(255,255,255,0.04)" stroke="rgba(96,165,250,0.20)" stroke-width="1"/>

  <!-- ArcaX card -->
  <rect x="790" y="80" width="270" height="236" rx="16"
        fill="rgba(255,255,255,0.04)" stroke="rgba(96,165,250,0.20)" stroke-width="1"/>

  <!-- ArcaP card -->
  <rect x="1100" y="80" width="270" height="236" rx="16"
        fill="rgba(255,255,255,0.06)" stroke="rgba(34,211,238,0.35)" stroke-width="1.5"/>
  <!-- ArcaP highlighted (current product) — extra glow border -->
  <rect x="1098" y="78" width="274" height="240" rx="17"
        fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="4"/>

  <!-- ════ ArcaQ card content ════ -->

  <!-- ArcaQ icon: brain / AI node cluster -->
  <g transform="translate(550,115)">
    <!-- center node -->
    <circle cx="35" cy="30" r="7" fill="none" stroke="url(#acQ)" stroke-width="2.5"/>
    <!-- satellite nodes -->
    <circle cx="10" cy="10" r="4" fill="none" stroke="url(#acQ)" stroke-width="2" opacity="0.8"/>
    <circle cx="60" cy="10" r="4" fill="none" stroke="url(#acQ)" stroke-width="2" opacity="0.8"/>
    <circle cx="10" cy="50" r="4" fill="none" stroke="url(#acQ)" stroke-width="2" opacity="0.6"/>
    <circle cx="60" cy="50" r="4" fill="none" stroke="url(#acQ)" stroke-width="2" opacity="0.6"/>
    <!-- connection lines -->
    <line x1="28" y1="25" x2="13"  y2="13"  stroke="url(#acQ)" stroke-width="1.5" opacity="0.7"/>
    <line x1="42" y1="25" x2="57"  y2="13"  stroke="url(#acQ)" stroke-width="1.5" opacity="0.7"/>
    <line x1="28" y1="35" x2="13"  y2="47"  stroke="url(#acQ)" stroke-width="1.5" opacity="0.5"/>
    <line x1="42" y1="35" x2="57"  y2="47"  stroke="url(#acQ)" stroke-width="1.5" opacity="0.5"/>
    <!-- inner pulse circle -->
    <circle cx="35" cy="30" r="13" fill="none" stroke="url(#acQ)" stroke-width="1" stroke-dasharray="3,4" opacity="0.4"/>
  </g>

  <!-- ArcaQ name -->
  <text x="615" y="220"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5"
        text-anchor="middle" fill="white">Arca<tspan fill="url(#accent)">Q</tspan></text>

  <!-- Badge: AI -->
  <rect x="575" y="234" width="80" height="24" rx="12"
        fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.40)" stroke-width="1"/>
  <text x="615" y="251"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="600" letter-spacing="2"
        text-anchor="middle" fill="rgba(96,165,250,0.95)">AI</text>

  <!-- ArcaQ description -->
  <text x="615" y="286"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="rgba(148,163,184,0.80)">Conversational AI</text>
  <text x="615" y="304"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="rgba(148,163,184,0.80)">&amp; Knowledge Retrieval</text>

  <!-- ════ ArcaX card content ════ -->

  <!-- ArcaX icon: MCP / inter-agent protocol nodes -->
  <g transform="translate(850,115)">
    <!-- hexagonal arrangement suggesting protocol mesh -->
    <polygon points="35,5 62,20 62,50 35,65 8,50 8,20"
             fill="none" stroke="url(#acX)" stroke-width="2" opacity="0.4"/>
    <!-- center -->
    <circle cx="35" cy="35" r="6" fill="none" stroke="url(#acX)" stroke-width="2.5"/>
    <!-- three outer nodes (top, bottom-left, bottom-right) -->
    <circle cx="35" cy="8"  r="4" fill="none" stroke="url(#acX)" stroke-width="2" opacity="0.85"/>
    <circle cx="12" cy="50" r="4" fill="none" stroke="url(#acX)" stroke-width="2" opacity="0.70"/>
    <circle cx="58" cy="50" r="4" fill="none" stroke="url(#acX)" stroke-width="2" opacity="0.70"/>
    <!-- spokes -->
    <line x1="35" y1="29" x2="35" y2="12"  stroke="url(#acX)" stroke-width="1.8" opacity="0.8"/>
    <line x1="30" y1="40" x2="15" y2="47"  stroke="url(#acX)" stroke-width="1.8" opacity="0.65"/>
    <line x1="40" y1="40" x2="55" y2="47"  stroke="url(#acX)" stroke-width="1.8" opacity="0.65"/>
  </g>

  <!-- ArcaX name -->
  <text x="925" y="220"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5"
        text-anchor="middle" fill="white">Arca<tspan fill="url(#accent)">X</tspan></text>

  <!-- Badge: MCP -->
  <rect x="877" y="234" width="96" height="24" rx="12"
        fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.40)" stroke-width="1"/>
  <text x="925" y="251"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="600" letter-spacing="2"
        text-anchor="middle" fill="rgba(96,165,250,0.95)">MCP</text>

  <!-- ArcaX description -->
  <text x="925" y="286"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="rgba(148,163,184,0.80)">Multi-Agent Protocol</text>
  <text x="925" y="304"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="rgba(148,163,184,0.80)">&amp; Orchestration Layer</text>

  <!-- ════ ArcaP card content (highlighted) ════ -->

  <!-- ArcaP icon (from existing SVG, scaled down) -->
  <g transform="translate(1170,110) scale(1.12)">
    <!-- bottom tier -->
    <path d="M4,44 Q30,36 56,44" stroke="url(#acP)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- middle tier -->
    <path d="M9,33 Q30,25 51,33" stroke="url(#acP)" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
    <!-- top tier -->
    <path d="M15,22 Q30,14 45,22" stroke="url(#acP)" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
    <!-- orchestration node -->
    <circle cx="30" cy="10" r="4" fill="url(#acP)"/>
    <!-- endpoint nodes -->
    <circle cx="4"  cy="44" r="2.5" fill="url(#acP)" opacity="0.55"/>
    <circle cx="56" cy="44" r="2.5" fill="url(#acP)" opacity="0.55"/>
    <!-- flow lines -->
    <line x1="30" y1="14" x2="4"  y2="44" stroke="url(#acP)" stroke-width="1.4" stroke-dasharray="2.5,3" opacity="0.7"/>
    <line x1="30" y1="14" x2="56" y2="44" stroke="url(#acP)" stroke-width="1.4" stroke-dasharray="2.5,3" opacity="0.7"/>
  </g>

  <!-- ArcaP name -->
  <text x="1235" y="220"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5"
        text-anchor="middle" fill="white">Arca<tspan fill="url(#accent)">P</tspan></text>

  <!-- Badge: OSS Platform -->
  <rect x="1163" y="234" width="144" height="24" rx="12"
        fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.50)" stroke-width="1"/>
  <text x="1235" y="251"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="11.5" font-weight="600" letter-spacing="1.5"
        text-anchor="middle" fill="rgba(34,211,238,0.95)">OSS PLATFORM</text>

  <!-- ArcaP description -->
  <text x="1235" y="286"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="rgba(148,163,184,0.80)">Open Data Lakehouse</text>
  <text x="1235" y="304"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" text-anchor="middle"
        fill="rgba(148,163,184,0.80)">&amp; Governance Platform</text>

  <!-- ── Bottom strip: website / tagline ── -->
  <text x="792" y="372"
        font-family="'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        font-size="13" letter-spacing="2.5"
        text-anchor="middle" fill="rgba(96,165,250,0.45)">talentys.eu  ·  open source  ·  on-premise  ·  enterprise-ready</text>
</svg>
